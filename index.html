<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern Landing Page • 2025 Style</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #6366f1;       /* indigo-500 */
      --primary-dark: #4f46e5;
      --text: #0f172a;
      --text-light: #475569;
      --bg: #ffffff;
      --light-gray: #f8fafc;
      --radius: 12px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
    }

    /* ── Header / Nav ── */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(226,232,240,0.8);
      transition: all 0.3s;
    }

    nav {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.1rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.5px;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      font-weight: 500;
    }

    .nav-links a {
      color: var(--text);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--primary);
    }

    .menu-toggle {
      display: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: var(--text);
    }

    /* ── Hero ── */
    .hero {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 0 5%;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      text-align: center;
    }

    .hero-content {
      max-width: 900px;
    }

    .hero h1 {
      font-size: clamp(3.2rem, 8vw, 5.5rem);
      font-weight: 700;
      line-height: 1.05;
      margin-bottom: 1.5rem;
      letter-spacing: -1.5px;
    }

    .hero p {
      font-size: 1.35rem;
      color: var(--text-light);
      margin-bottom: 2.5rem;
      max-width: 620px;
      margin-left: auto;
      margin-right: auto;
    }

    .btn {
      display: inline-block;
      padding: 1rem 2.2rem;
      background: var(--primary);
      color: white;
      font-weight: 600;
      border-radius: var(--radius);
      text-decoration: none;
      transition: all 0.25s;
      box-shadow: 0 10px 25px -10px rgba(99,102,241,0.4);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px -10px rgba(99,102,241,0.5);
      background: var(--primary-dark);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
      margin-left: 1.2rem;
    }

    .btn-outline:hover {
      background: var(--primary);
      color: white;
    }

    /* ── Mobile Menu ── */
    @media (max-width: 768px) {
      .nav-links {
        position: fixed;
        inset: 0 0 0 40%;
        flex-direction: column;
        background: white;
        padding: 8rem 2rem 2rem;
        transform: translateX(100%);
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 999;
      }

      .nav-links.show {
        transform: translateX(0);
      }

      .menu-toggle {
        display: block;
      }
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <div class="logo">Brand</div>
      
      <div class="nav-links" id="navLinks">
        <a href="#home" class="active">Home</a>
        <a href="#features">Features</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
      </div>

      <div class="menu-toggle" id="menuToggle">☰</div>
    </nav>
  </header>

  <section class="hero" id="home">
    <div class="hero-content">
      <h1>Build something <span style="color:var(--primary)">beautiful</span></h1>
      <p>Modern, fast, responsive websites that actually convert visitors into customers — built for 2025 and beyond.</p>
      
      <div style="margin-top: 2rem;">
        <a href="#" class="btn">Get Started</a>
        <a href="#" class="btn btn-outline">Watch Demo</a>
      </div>
    </div>
  </section>

  <script>
    // Mobile menu toggle
    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');

    menuToggle.addEventListener('click', () => {
      navLinks.classList.toggle('show');
      menuToggle.textContent = navLinks.classList.contains('show') ? '✕' : '☰';
    });

    // Close mobile menu when clicking a link
    document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', () => {
        navLinks.classList.remove('show');
        menuToggle.textContent = '☰';
      });
    });
  </script>
</body>
</html>
